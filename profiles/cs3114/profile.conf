kind=junit-pit-webcat
description=CS3114 profile: Java 11 compile, student.jar JUnit tests, and PIT 1.6.8 mutation checks.
commands=test,mutate,doctor,report
test_backend=direct_junit
style_backend=none
coverage_backend=none
mutation_backend=pit168
compile_release=11
required_tools=java,javac
test_jars=student.jar,junit.jar,hamcrest.jar
mutation_jars=pitest-command-line.jar,pitest.jar,pitest-entry.jar,pitest-html-report.jar
threshold_default=90
pit_mutators=REMOVE_CONDITIONALS,AOD1,AOD2
zero_test_policy=fail
