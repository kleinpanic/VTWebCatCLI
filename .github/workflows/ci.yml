name: CI

on:
  push:
  pull_request:

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install legacy Python dependencies
        run: python -m pip install -r legacy/VTWebCatCLI/requirements.txt

      - name: Validate legacy VTWebCatCLI import
        run: |
          python -m py_compile legacy/VTWebCatCLI/WebcatCLI.py
          python legacy/VTWebCatCLI/WebcatCLI.py --version
          bash legacy/VTWebCatCLI/tests/test_webcatcli.sh

      - name: Run CLI smoke tests
        run: bash test/run.sh

      - name: Validate doctor JSON
        run: |
          bin/webcat doctor | python3 -m json.tool >/tmp/webcat-doctor.json
          bin/webcat --profile cs2505 doctor | python3 -m json.tool >/tmp/webcat-doctor-cs2505.json
          bin/webcat --profile cs3114 doctor | python3 -m json.tool >/tmp/webcat-doctor-cs3114.json
