name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install classic Python dependencies
        run: python -m pip install -r vtwebcatcli/classic/requirements.txt

      - name: Validate repository shape
        run: bash tests/repo-health.sh

      - name: Validate classic VTWebCatCLI engine
        run: |
          python -m py_compile vtwebcatcli/classic/WebcatCLI.py
          python WebcatCLI.py --version
          bash vtwebcatcli/classic/tests/test_webcatcli.sh
          bash tests/classic-run-tests.sh

      - name: Run CLI smoke tests
        run: bash tests/run.sh

      - name: Validate doctor JSON
        run: |
          bin/webcat doctor | python3 -m json.tool >/tmp/webcat-doctor.json
          bin/webcat --profile cs2505 doctor | python3 -m json.tool >/tmp/webcat-doctor-cs2505.json
          bin/webcat --profile cs3114 doctor | python3 -m json.tool >/tmp/webcat-doctor-cs3114.json

      - name: Validate clone/install smoke path
        run: |
          tmp="$(mktemp -d)"
          git archive HEAD | tar -x -C "$tmp"
          "$tmp/WebcatCLI.py" --version
          "$tmp/bin/webcat" --profile cs2505 doctor | python3 -m json.tool >/tmp/webcat-install-cs2505.json
          "$tmp/bin/webcat" --profile cs3114 doctor | python3 -m json.tool >/tmp/webcat-install-cs3114.json

      - name: Validate release package contents
        run: bash tests/package-smoke.sh
